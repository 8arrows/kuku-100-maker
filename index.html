<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>九九100問メーカー</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #20242c;
      --muted: #626a76;
      --line: #d8dee8;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --accent: #236c72;
      --accent-strong: #174d52;
      --gold: #b78228;
      --soft: #edf6f4;
      --danger: #9a3c35;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(35, 108, 114, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(183, 130, 40, 0.06) 1px, transparent 1px),
        var(--paper);
      background-size: 34px 34px;
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .stamp {
      min-width: 132px;
      border: 2px solid var(--gold);
      color: var(--gold);
      padding: 10px 14px;
      text-align: center;
      font-weight: 800;
      transform: rotate(2deg);
      background: rgba(255, 255, 255, 0.72);
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 12px;
      align-items: end;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 32px rgba(32, 36, 44, 0.08);
      margin-bottom: 18px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      min-height: 42px;
    }

    .check {
      display: flex;
      min-height: 42px;
      align-items: center;
      gap: 9px;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
    }

    .check input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--accent);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      min-height: 42px;
      padding: 10px 14px;
      color: var(--accent);
      background: #fff;
      cursor: pointer;
      font-weight: 800;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--accent-strong);
      color: var(--accent-strong);
      background: var(--soft);
    }

    .primary {
      color: #fff;
      background: var(--accent);
    }

    .primary:hover,
    .primary:focus-visible {
      color: #fff;
      background: var(--accent-strong);
    }

    .danger {
      color: var(--danger);
      border-color: rgba(154, 60, 53, 0.55);
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 14px;
    }

    .summary span {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.8);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .sheet {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 12px 36px rgba(32, 36, 44, 0.08);
    }

    .sheet-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 14px;
      align-items: center;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .sheet-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .blank {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .blank::after {
      content: "";
      display: block;
      width: 96px;
      border-bottom: 1px solid var(--ink);
    }

    .problems {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-template-rows: repeat(25, minmax(31px, auto));
      grid-auto-flow: column;
      gap: 8px 14px;
      counter-reset: problem;
    }

    .problem {
      counter-increment: problem;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 8px;
      align-items: baseline;
      min-height: 31px;
      padding: 4px 0;
      border-bottom: 1px dashed #d6d6d6;
      break-inside: avoid;
    }

    .problem::before {
      content: counter(problem) ".";
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .formula {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .answer {
      color: var(--accent);
      min-width: 28px;
      text-align: right;
    }

    .hidden-answer .answer {
      color: transparent;
    }

    .empty {
      padding: 42px 16px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(237, 246, 244, 0.45);
    }

    @media (max-width: 880px) {
      header,
      .sheet-head {
        grid-template-columns: 1fr;
      }

      .stamp {
        justify-self: start;
      }

      .toolbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .problems {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(50, minmax(31px, auto));
      }
    }

    @media (max-width: 540px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      .toolbar,
      .problems {
        grid-template-columns: 1fr;
      }

      .problems {
        grid-template-rows: none;
        grid-auto-flow: row;
      }

      .sheet {
        padding: 15px;
      }

      .actions button {
        flex: 1 1 150px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .app {
        width: 100%;
        padding: 0;
      }

      header,
      .toolbar,
      .actions,
      .summary {
        display: none;
      }

      .sheet {
        border: 0;
        box-shadow: none;
        padding: 0;
      }

      .problems {
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(25, minmax(29px, auto));
        grid-auto-flow: column;
        gap: 6px 13px;
      }

      .problem {
        min-height: 29px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>九九100問メーカー</h1>
        <p class="lead">かけ算と、割り切れるわり算の100問プリントを自動生成できます。</p>
      </div>
      <div class="stamp" aria-label="100問プリント">100問</div>
    </header>

    <section class="toolbar" aria-label="問題の設定">
      <label>
        種類
        <select id="mode">
          <option value="multiplication">かけ算</option>
          <option value="division">わり算</option>
        </select>
      </label>
      <label>
        並び方
        <select id="order">
          <option value="random">ランダム</option>
          <option id="orderSequential" value="dan">0の段から順番</option>
          <option value="hard">むずかしめ優先</option>
        </select>
      </label>
      <label>
        答え
        <span class="check">
          <input id="showAnswers" type="checkbox">
          表示する
        </span>
      </label>
    </section>

    <div class="actions" aria-label="操作">
      <button class="primary" id="generate">問題を作る</button>
      <button id="toggleAnswers">答えを表示</button>
      <button id="print">印刷</button>
      <button id="download">CSV保存</button>
      <button class="danger" id="clear">消去</button>
    </div>

    <p class="summary" id="summary" aria-live="polite"></p>

    <section class="sheet hidden-answer" id="sheet" aria-label="問題プリント">
      <div class="sheet-head">
        <h2 class="sheet-title">九九のかけ算</h2>
        <span class="blank">なまえ</span>
        <span class="blank">タイム</span>
      </div>
      <div class="empty" id="empty">「問題を作る」を押すと、ここに100問が並びます。</div>
      <div class="problems" id="problems"></div>
    </section>
  </main>

  <script>
    const elements = {
      mode: document.querySelector("#mode"),
      order: document.querySelector("#order"),
      orderSequential: document.querySelector("#orderSequential"),
      showAnswers: document.querySelector("#showAnswers"),
      generate: document.querySelector("#generate"),
      toggleAnswers: document.querySelector("#toggleAnswers"),
      print: document.querySelector("#print"),
      download: document.querySelector("#download"),
      clear: document.querySelector("#clear"),
      summary: document.querySelector("#summary"),
      sheet: document.querySelector("#sheet"),
      empty: document.querySelector("#empty"),
      problems: document.querySelector("#problems")
    };

    let currentProblems = [];

    function shuffle(items) {
      const copied = [...items];
      for (let index = copied.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copied[index], copied[swapIndex]] = [copied[swapIndex], copied[index]];
      }
      return copied;
    }

    function makeMultiplicationPool() {
      const dans = Array.from({ length: 10 }, (_, index) => index);
      const multipliers = Array.from({ length: 10 }, (_, index) => index);
      return dans.flatMap((dan) => multipliers.map((multiplier) => ({
        left: dan,
        right: multiplier,
        answer: dan * multiplier,
        difficulty: (dan >= 6 ? 2 : 0) + (multiplier >= 6 ? 2 : 0) + (dan === multiplier ? 1 : 0)
      })));
    }

    function makeDivisionPool() {
      const answers = Array.from({ length: 10 }, (_, index) => index);
      const divisors = Array.from({ length: 10 }, (_, index) => index + 1);
      return answers.flatMap((answer) => divisors.map((divisor) => ({
        left: answer * divisor,
        right: divisor,
        answer,
        difficulty: (answer >= 6 ? 2 : 0) + (divisor >= 6 ? 2 : 0) + (answer === divisor ? 1 : 0)
      })));
    }

    function buildProblems() {
      const pool = elements.mode.value === "division" ? makeDivisionPool() : makeMultiplicationPool();
      let orderedPool = [...pool];
      if (elements.order.value === "random") {
        orderedPool = shuffle(pool);
      }
      if (elements.order.value === "dan") {
        orderedPool.sort((a, b) => a.answer - b.answer || a.right - b.right);
      }
      if (elements.order.value === "hard") {
        orderedPool = shuffle(pool).sort((a, b) => b.difficulty - a.difficulty);
      }

      currentProblems = orderedPool.map((item) => ({ ...item }));
      render();
    }

    function render() {
      const showAnswers = elements.showAnswers.checked;
      const isDivision = elements.mode.value === "division";
      elements.sheet.classList.toggle("hidden-answer", !showAnswers);
      elements.toggleAnswers.textContent = showAnswers ? "答えを隠す" : "答えを表示";
      elements.orderSequential.textContent = isDivision ? "答えごとに順番" : "0の段から順番";
      document.querySelector(".sheet-title").textContent = isDivision ? "九九のわり算" : "九九のかけ算";
      elements.empty.hidden = currentProblems.length > 0;
      elements.problems.replaceChildren(...currentProblems.map((problem) => {
        const row = document.createElement("div");
        row.className = "problem";

        const formula = document.createElement("div");
        formula.className = "formula";

        const question = document.createElement("span");
        question.textContent = isDivision ? `${problem.left} ÷ ${problem.right} =` : `${problem.left} × ${problem.right} =`;

        const answer = document.createElement("span");
        answer.className = "answer";
        answer.textContent = problem.answer;

        formula.append(question, answer);
        row.append(formula);
        return row;
      }));

      if (currentProblems.length === 0) {
        elements.summary.textContent = "";
        return;
      }

      elements.summary.replaceChildren(
        makeSummaryItem(`${currentProblems.length}問`),
        makeSummaryItem(isDivision ? "わり算" : "かけ算"),
        makeSummaryItem(isDivision ? "答え 0から9" : "0から9の段"),
        makeSummaryItem(isDivision ? "わる数 1から10" : "かける数 0から9"),
        makeSummaryItem("1列25問"),
        makeSummaryItem(showAnswers ? "答えあり" : "答えなし")
      );
    }

    function makeSummaryItem(text) {
      const item = document.createElement("span");
      item.textContent = text;
      return item;
    }

    function downloadCsv() {
      if (currentProblems.length === 0) buildProblems();
      const rows = [["番号", "問題", "答え"], ...currentProblems.map((problem, index) => [
        index + 1,
        elements.mode.value === "division" ? `${problem.left} ÷ ${problem.right}` : `${problem.left} x ${problem.right}`,
        problem.answer
      ])];
      const csv = rows.map((row) => row.map((cell) => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("\n");
      const blob = new Blob([`\uFEFF${csv}`], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "kuku-100.csv";
      anchor.click();
      URL.revokeObjectURL(url);
    }

    elements.generate.addEventListener("click", buildProblems);
    elements.mode.addEventListener("change", buildProblems);
    elements.showAnswers.addEventListener("change", render);
    elements.toggleAnswers.addEventListener("click", () => {
      elements.showAnswers.checked = !elements.showAnswers.checked;
      render();
    });
    elements.print.addEventListener("click", () => {
      if (currentProblems.length === 0) buildProblems();
      window.print();
    });
    elements.download.addEventListener("click", downloadCsv);
    elements.clear.addEventListener("click", () => {
      currentProblems = [];
      render();
    });

    buildProblems();
  </script>
</body>
</html>
